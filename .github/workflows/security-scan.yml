name: Security Scan

on:
  push:
  pull_request:
    branches: [main, master, develop, dev]
  schedule:
    - cron: '0 2 * * 1'  # every Monday at 02:00 UTC
  workflow_dispatch:

jobs:

  bandit:
    name: Code Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit[toml]
      - run: |
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --format json --output bandit-report.json \
            --severity-level medium || true
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --severity-level medium || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (CLI)
        run: |
          pip install semgrep
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" \
            --json --output=semgrep-report.json || true
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  gitleaks:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact || true
      - name: Export Gitleaks report
        run: gitleaks detect --source . --log-opts="--all" --redact --report-format json --report-path gitleaks-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  pip-audit:
    name: Dependency CVE (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pip-audit
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, gitleaks, pip-audit]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate findings summary
        run: |
          python3 << 'EOF'
          import json, os, sys

          SUMMARY = os.environ["GITHUB_STEP_SUMMARY"]

          def badge(n, high=True):
              if n == 0:
                  return "✅ 0"
              return f"🔴 {n}" if high else f"🟡 {n}"

          def write(line=""):
              with open(SUMMARY, "a") as f:
                  f.write(line + "\n")

          write("## 🔍 Security Scan Summary\n")

          # ── Job status table ─────────────────────────────────────────────
          write("### Scanner Status")
          write("| Scanner | Job Status |")
          write("|---------|-----------|")
          for scanner, result in [
              ("Bandit",    "${{ needs.bandit.result }}"),
              ("Semgrep",   "${{ needs.semgrep.result }}"),
              ("Gitleaks",  "${{ needs.gitleaks.result }}"),
              ("pip-audit", "${{ needs.pip-audit.result }}"),
          ]:
              icon = "✅" if result == "success" else "❌"
              write(f"| {scanner} | {icon} {result} |")

          write("")

          # ── Bandit ────────────────────────────────────────────────────────
          write("---")
          write("### 🐍 Bandit — Python Code Security")
          bandit_path = "reports/bandit-report/bandit-report.json"
          try:
              with open(bandit_path) as f:
                  data = json.load(f)
              results = data.get("results", [])

              high   = [r for r in results if r.get("issue_severity") in ("HIGH", "CRITICAL")]
              medium = [r for r in results if r.get("issue_severity") == "MEDIUM"]

              write(f"**{badge(len(high))} High/Critical &nbsp;&nbsp; {badge(len(medium), False)} Medium**\n")

              for label, items in [("🔴 High / Critical", high), ("🟡 Medium", medium)]:
                  if not items:
                      continue
                  write(f"<details><summary>{label} ({len(items)} findings)</summary>\n")
                  write("| Severity | File | Line | Issue |")
                  write("|----------|------|------|-------|")
                  for r in items:
                      sev  = r.get("issue_severity", "")
                      file = r.get("filename", "").replace("./", "")
                      line = r.get("line_number", "")
                      msg  = r.get("issue_text", "").replace("|", "\\|")[:120]
                      write(f"| {sev} | `{file}` | {line} | {msg} |")
                  write("\n</details>\n")
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── Semgrep ───────────────────────────────────────────────────────
          write("---")
          write("### 🔎 Semgrep — SAST")
          semgrep_path = "reports/semgrep-report/semgrep-report.json"
          try:
              with open(semgrep_path) as f:
                  data = json.load(f)
              results = data.get("results", [])

              def sg_sev(r):
                  return r.get("extra", {}).get("severity", "").upper()

              high   = [r for r in results if sg_sev(r) in ("ERROR", "HIGH", "CRITICAL")]
              medium = [r for r in results if sg_sev(r) in ("WARNING", "MEDIUM")]

              write(f"**{badge(len(high))} High/Critical &nbsp;&nbsp; {badge(len(medium), False)} Medium**\n")

              for label, items in [("🔴 High / Critical", high), ("🟡 Medium", medium)]:
                  if not items:
                      continue
                  write(f"<details><summary>{label} ({len(items)} findings)</summary>\n")
                  write("| Severity | File | Line | Rule | Message |")
                  write("|----------|------|------|------|---------|")
                  for r in items:
                      sev   = sg_sev(r)
                      file  = r.get("path", "").replace("./", "")
                      line  = r.get("start", {}).get("line", "")
                      rule  = r.get("check_id", "").split(".")[-1][:40]
                      msg   = r.get("extra", {}).get("message", "").replace("|", "\\|")[:100]
                      write(f"| {sev} | `{file}` | {line} | `{rule}` | {msg} |")
                  write("\n</details>\n")
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── Gitleaks ──────────────────────────────────────────────────────
          write("---")
          write("### 🔑 Gitleaks — Secrets Detection")
          gitleaks_path = "reports/gitleaks-report/gitleaks-report.json"
          try:
              with open(gitleaks_path) as f:
                  content = f.read().strip()
              leaks = json.loads(content) if content and content != "null" else []
              leaks = leaks if isinstance(leaks, list) else []

              write(f"**{badge(len(leaks))} Secrets found**\n")

              if leaks:
                  write("<details><summary>🔴 Secrets ({} findings)</summary>\n".format(len(leaks)))
                  write("| Rule | File | Line | Commit |")
                  write("|------|------|------|--------|")
                  for leak in leaks:
                      rule   = leak.get("RuleID", leak.get("Description", ""))[:40]
                      file   = leak.get("File", "")
                      line   = leak.get("StartLine", "")
                      commit = leak.get("Commit", "")[:8]
                      write(f"| `{rule}` | `{file}` | {line} | `{commit}` |")
                  write("\n</details>\n")
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── pip-audit ─────────────────────────────────────────────────────
          write("---")
          write("### 📦 pip-audit — Dependency CVEs")
          pip_path = "reports/pip-audit-report/pip-audit-report.json"
          try:
              with open(pip_path) as f:
                  data = json.load(f)

              vulns = []
              for dep in data.get("dependencies", []):
                  for v in dep.get("vulns", []):
                      vulns.append({
                          "package": dep.get("name", ""),
                          "version": dep.get("version", ""),
                          "id":      v.get("id", ""),
                          "fix":     ", ".join(v.get("fix_versions", [])) or "no fix",
                          "severity": (v.get("aliases", [""])[0] if v.get("aliases") else v.get("id", ""))
                      })

              # Heuristic: GHSA/CVE with HIGH/CRITICAL in id or no alias = treat as high
              high   = [v for v in vulns if "CRITICAL" in v["id"].upper() or "HIGH" in v["id"].upper()]
              medium = [v for v in vulns if v not in high]

              write(f"**{badge(len(high))} High/Critical &nbsp;&nbsp; {badge(len(medium), False)} Medium/Other**\n")

              for label, items in [("🔴 High / Critical", high), ("🟡 Medium / Other", medium)]:
                  if not items:
                      continue
                  write(f"<details><summary>{label} ({len(items)} findings)</summary>\n")
                  write("| Package | Version | CVE/ID | Fix |")
                  write("|---------|---------|--------|-----|")
                  for v in items:
                      write(f"| `{v['package']}` | {v['version']} | `{v['id']}` | {v['fix']} |")
                  write("\n</details>\n")

              if not vulns:
                  write("✅ No vulnerable dependencies found.")
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          write("\n---")
          write("_Reports available as workflow artifacts._")
          EOF
