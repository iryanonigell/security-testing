name: Security Scan

on:
  push:
  pull_request:
    branches: [main, master, develop, dev]
  schedule:
    - cron: '0 2 * * 1'  # every Monday at 02:00 UTC
  workflow_dispatch:

jobs:

  bandit:
    name: Code Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit[toml]
      - run: |
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --format json --output bandit-report.json \
            --severity-level low || true
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --severity-level low || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (CLI)
        run: |
          pip install semgrep
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" \
            --json --output=semgrep-report.json || true
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  gitleaks:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact || true
      - name: Export Gitleaks report
        run: gitleaks detect --source . --log-opts="--all" --redact --report-format json --report-path gitleaks-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  pip-audit:
    name: Dependency CVE (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
          pip-audit -r requirements.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, gitleaks, pip-audit]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate findings summary
        run: |
          python3 << 'EOF'
          import json, os

          SUMMARY = os.environ["GITHUB_STEP_SUMMARY"]

          def badge(n, tier="high"):
              if n == 0:
                  return "✅ 0"
              return {"high": f"🔴 {n}", "medium": f"🟡 {n}", "low": f"🔵 {n}"}.get(tier, f"⚪ {n}")

          def write(line=""):
              with open(SUMMARY, "a") as f:
                  f.write(line + "\n")

          def section(label, items, columns, row_fn):
              if not items:
                  return
              write(f"<details><summary>{label} ({len(items)} findings)</summary>\n")
              write("| " + " | ".join(columns) + " |")
              write("|" + "|".join("---" for _ in columns) + "|")
              for item in items:
                  write(row_fn(item))
              write("\n</details>\n")

          def esc(s):
              return str(s).replace("|", "\\|").replace("\n", " ").strip()

          # ── Load all reports up-front so counts are available for the header table ──
          bandit_results, semgrep_results, leaks, pip_vulns = [], [], [], []
          bandit_err = semgrep_err = gitleaks_err = pip_err = ""

          try:
              with open("reports/bandit-report/bandit-report.json") as f:
                  bandit_results = json.load(f).get("results", [])
          except FileNotFoundError:
              bandit_err = "report not found"
          except Exception as e:
              bandit_err = str(e)

          try:
              with open("reports/semgrep-report/semgrep-report.json") as f:
                  semgrep_results = json.load(f).get("results", [])
          except FileNotFoundError:
              semgrep_err = "report not found"
          except Exception as e:
              semgrep_err = str(e)

          try:
              with open("reports/gitleaks-report/gitleaks-report.json") as f:
                  content = f.read().strip()
              raw = json.loads(content) if content and content != "null" else []
              leaks = raw if isinstance(raw, list) else []
          except FileNotFoundError:
              gitleaks_err = "report not found"
          except Exception as e:
              gitleaks_err = str(e)

          try:
              with open("reports/pip-audit-report/pip-audit-report.json") as f:
                  pip_data = json.load(f)
              for dep in pip_data.get("dependencies", []):
                  for v in dep.get("vulns", []):
                      desc = v.get("description", "")
                      du = desc.upper()
                      if "CRITICAL" in du:           tier = "high"
                      elif "HIGH" in du:             tier = "high"
                      elif "MODERATE" in du or "MEDIUM" in du: tier = "medium"
                      elif "LOW" in du:              tier = "low"
                      else:                          tier = "medium"
                      pip_vulns.append({
                          "package": dep.get("name", ""),
                          "version": dep.get("version", ""),
                          "id":      v.get("id", ""),
                          "aliases": ", ".join(v.get("aliases", [])),
                          "fix":     ", ".join(v.get("fix_versions", [])) or "no fix",
                          "desc":    desc[:160],
                          "tier":    tier,
                      })
          except FileNotFoundError:
              pip_err = "report not found"
          except Exception as e:
              pip_err = str(e)

          # ── Severity buckets ──────────────────────────────────────────────
          def sg_sev(r):
              return r.get("extra", {}).get("severity", "").upper()

          b_high   = [r for r in bandit_results if r.get("issue_severity") in ("HIGH", "CRITICAL")]
          b_medium = [r for r in bandit_results if r.get("issue_severity") == "MEDIUM"]
          b_low    = [r for r in bandit_results if r.get("issue_severity") == "LOW"]

          sg_high   = [r for r in semgrep_results if sg_sev(r) in ("ERROR", "HIGH", "CRITICAL")]
          sg_medium = [r for r in semgrep_results if sg_sev(r) in ("WARNING", "MEDIUM")]
          sg_low    = [r for r in semgrep_results if sg_sev(r) in ("INFO", "NOTE", "LOW")]

          p_high   = [v for v in pip_vulns if v["tier"] == "high"]
          p_medium = [v for v in pip_vulns if v["tier"] == "medium"]
          p_low    = [v for v in pip_vulns if v["tier"] == "low"]

          # ── Header ────────────────────────────────────────────────────────
          write("## 🔍 Security Scan Summary\n")
          write("### Overview")
          write("| Scanner | Job | 🔴 High/Crit | 🟡 Medium | 🔵 Low | Total |")
          write("|---------|-----|-------------|----------|-------|-------|")

          def status_icon(r):
              return "✅" if r == "success" else "❌"

          bandit_total = len(bandit_results)
          write(
              f"| 🐍 Bandit | {status_icon('${{ needs.bandit.result }}')} ${{ needs.bandit.result }} "
              f"| {len(b_high)} | {len(b_medium)} | {len(b_low)} | **{bandit_total}** |"
          )
          sg_total = len(semgrep_results)
          write(
              f"| 🔎 Semgrep | {status_icon('${{ needs.semgrep.result }}')} ${{ needs.semgrep.result }} "
              f"| {len(sg_high)} | {len(sg_medium)} | {len(sg_low)} | **{sg_total}** |"
          )
          write(
              f"| 🔑 Gitleaks | {status_icon('${{ needs.gitleaks.result }}')} ${{ needs.gitleaks.result }} "
              f"| {len(leaks)} | — | — | **{len(leaks)}** |"
          )
          pip_total = len(pip_vulns)
          write(
              f"| 📦 pip-audit | {status_icon('${{ needs.pip-audit.result }}')} ${{ needs.pip-audit.result }} "
              f"| {len(p_high)} | {len(p_medium)} | {len(p_low)} | **{pip_total}** |"
          )
          write("")

          # ── Bandit ────────────────────────────────────────────────────────
          write("---")
          write("### 🐍 Bandit — Python Code Security")
          if bandit_err:
              write(f"_Error: {bandit_err}_")
          else:
              write(
                  f"**{badge(len(b_high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(b_medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(b_low), 'low')} Low**\n"
              )

              def bandit_row(r):
                  sev   = r.get("issue_severity", "")
                  tid   = r.get("test_id", "")
                  tname = r.get("test_name", "")
                  file  = r.get("filename", "").lstrip("./")
                  line  = r.get("line_number", "")
                  conf  = r.get("issue_confidence", "")
                  cwe   = r.get("issue_cwe", {}).get("id", "")
                  cwe_s = f"[CWE-{cwe}](https://cwe.mitre.org/data/definitions/{cwe}.html)" if cwe else ""
                  msg   = esc(r.get("issue_text", ""))[:120]
                  code  = esc(r.get("code", "")).replace("`", "'")[:80]
                  url   = r.get("more_info", "")
                  rule  = f"[{tid}]({url})" if url else tid
                  return f"| {sev} | {rule} `{tname}` | `{file}:{line}` | {conf} | {cwe_s} | {msg} | `{code}` |"

              cols = ["Sev", "Rule ID", "Location", "Confidence", "CWE", "Issue", "Code Snippet"]
              section("🔴 High / Critical", b_high,   cols, bandit_row)
              section("🟡 Medium",          b_medium, cols, bandit_row)
              section("🔵 Low",             b_low,    cols, bandit_row)

          # ── Semgrep ───────────────────────────────────────────────────────
          write("---")
          write("### 🔎 Semgrep — SAST")
          if semgrep_err:
              write(f"_Error: {semgrep_err}_")
          else:
              write(
                  f"**{badge(len(sg_high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(sg_medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(sg_low), 'low')} Low/Info**\n"
              )

              SEV_NORM = {
                  "ERROR": "HIGH", "CRITICAL": "HIGH", "HIGH": "HIGH",
                  "WARNING": "MEDIUM", "MEDIUM": "MEDIUM",
                  "INFO": "LOW", "NOTE": "LOW", "LOW": "LOW",
              }

              def sg_row(r):
                  raw   = sg_sev(r)
                  sev   = SEV_NORM.get(raw, raw)
                  file  = r.get("path", "").lstrip("./")
                  start = r.get("start", {})
                  end   = r.get("end", {})
                  loc   = f"{file}:{start.get('line','')}"
                  if end.get("line") and end["line"] != start.get("line"):
                      loc += f"-{end['line']}"
                  full_rule = r.get("check_id", "")
                  short     = full_rule.split(".")[-1][:40]
                  meta  = r.get("extra", {}).get("metadata", {})
                  cwe   = meta.get("cwe", meta.get("cwe2022-top25", ""))
                  if isinstance(cwe, list): cwe = cwe[0] if cwe else ""
                  owasp = meta.get("owasp", "")
                  if isinstance(owasp, list): owasp = owasp[0] if owasp else ""
                  msg   = esc(r.get("extra", {}).get("message", ""))[:120]
                  lines = esc(r.get("extra", {}).get("lines", "")).replace("`","'")[:80]
                  return f"| {sev} | `{short}` | `{full_rule}` | `{loc}` | {esc(cwe)[:30]} | {esc(owasp)[:30]} | {msg} | `{lines}` |"

              cols = ["Sev", "Rule (short)", "Rule (full)", "Location", "CWE", "OWASP", "Message", "Code Snippet"]
              section("🔴 High / Critical", sg_high,   cols, sg_row)
              section("🟡 Medium",          sg_medium, cols, sg_row)
              section("🔵 Low / Info",      sg_low,    cols, sg_row)

          # ── Gitleaks ──────────────────────────────────────────────────────
          write("---")
          write("### 🔑 Gitleaks — Secrets Detection")
          if gitleaks_err:
              write(f"_Error: {gitleaks_err}_")
          else:
              write(f"**{badge(len(leaks))} Secrets found** _(all secrets treated as HIGH)_\n")

              def leak_row(leak):
                  rule   = esc(leak.get("RuleID", ""))[:35]
                  desc   = esc(leak.get("Description", ""))[:50]
                  file   = leak.get("File", "")
                  line   = leak.get("StartLine", "")
                  commit = leak.get("Commit", "")[:8]
                  author = esc(leak.get("Author", ""))
                  email  = esc(leak.get("Email", ""))
                  date   = leak.get("Date", "")[:10]
                  tags   = ", ".join(leak.get("Tags", []))
                  msg    = esc(leak.get("Message", ""))[:60]
                  return f"| `{rule}` | {desc} | `{file}:{line}` | `{commit}` | {author} | {email} | {date} | {tags} | {msg} |"

              section(
                  f"🔴 Secrets ({len(leaks)} found)", leaks,
                  ["Rule ID", "Description", "Location", "Commit", "Author", "Email", "Date", "Tags", "Commit Message"],
                  leak_row,
              )
              if not leaks:
                  write("✅ No secrets detected.")

          # ── pip-audit ─────────────────────────────────────────────────────
          write("---")
          write("### 📦 pip-audit — Dependency CVEs")
          if pip_err:
              write(f"_Error: {pip_err}_")
          elif not pip_vulns:
              write("✅ No vulnerable dependencies found.")
          else:
              write(
                  f"**{badge(len(p_high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(p_medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(p_low), 'low')} Low**\n"
              )

              def pip_row(v):
                  desc = esc(v["desc"])[:140]
                  return (
                      f"| `{v['package']}` | {v['version']} | `{v['id']}` "
                      f"| {v['aliases']} | {v['fix']} | {desc} |"
                  )

              cols = ["Package", "Version", "GHSA ID", "CVE Aliases", "Fix Version", "Description"]
              section("🔴 High / Critical", p_high,   cols, pip_row)
              section("🟡 Medium",          p_medium, cols, pip_row)
              section("🔵 Low",             p_low,    cols, pip_row)

          write("\n---")
          write("_Full JSON reports available as workflow artifacts._")
          EOF
