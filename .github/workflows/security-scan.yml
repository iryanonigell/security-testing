name: Security Scan

on:
  push:
  pull_request:
    branches: [main, master, develop, dev]
  schedule:
    - cron: '0 2 * * 1'  # every Monday at 02:00 UTC
  workflow_dispatch:

jobs:

  bandit:
    name: Code Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit[toml]
      - run: |
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --format json --output bandit-report.json \
            --severity-level medium || true
          bandit -r . \
            --exclude "./.venv,./tests,./node_modules" \
            --severity-level medium || true
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (CLI)
        run: |
          pip install semgrep
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" \
            --json --output=semgrep-report.json || true
          semgrep --config=auto . \
            --exclude=".venv" --exclude="tests" --exclude="node_modules" || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  gitleaks:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d v)_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact || true
      - name: Export Gitleaks report
        run: gitleaks detect --source . --log-opts="--all" --redact --report-format json --report-path gitleaks-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  pip-audit:
    name: Dependency CVE (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install pip-audit
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, gitleaks, pip-audit]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate findings summary
        run: |
          python3 << 'EOF'
          import json, os

          SUMMARY = os.environ["GITHUB_STEP_SUMMARY"]

          def badge(n, tier="high"):
              if n == 0:
                  return "✅ 0"
              return {"high": f"🔴 {n}", "medium": f"🟡 {n}", "low": f"🔵 {n}"}.get(tier, f"⚪ {n}")

          def write(line=""):
              with open(SUMMARY, "a") as f:
                  f.write(line + "\n")

          def section(label, items, columns, row_fn):
              if not items:
                  return
              write(f"<details><summary>{label} ({len(items)} findings)</summary>\n")
              write("| " + " | ".join(columns) + " |")
              write("|" + "|".join("---" for _ in columns) + "|")
              for item in items:
                  write(row_fn(item))
              write("\n</details>\n")

          write("## 🔍 Security Scan Summary\n")

          # ── Job status ────────────────────────────────────────────────────
          write("### Scanner Status")
          write("| Scanner | Job Status |")
          write("|---------|-----------|")
          for scanner, result in [
              ("Bandit",    "${{ needs.bandit.result }}"),
              ("Semgrep",   "${{ needs.semgrep.result }}"),
              ("Gitleaks",  "${{ needs.gitleaks.result }}"),
              ("pip-audit", "${{ needs.pip-audit.result }}"),
          ]:
              icon = "✅" if result == "success" else "❌"
              write(f"| {scanner} | {icon} {result} |")
          write("")

          # ── Bandit ────────────────────────────────────────────────────────
          write("---")
          write("### 🐍 Bandit — Python Code Security")
          try:
              with open("reports/bandit-report/bandit-report.json") as f:
                  data = json.load(f)
              results = data.get("results", [])

              high   = [r for r in results if r.get("issue_severity") in ("HIGH", "CRITICAL")]
              medium = [r for r in results if r.get("issue_severity") == "MEDIUM"]
              low    = [r for r in results if r.get("issue_severity") == "LOW"]

              write(
                  f"**{badge(len(high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(low), 'low')} Low**\n"
              )

              def bandit_row(r):
                  sev  = r.get("issue_severity", "")
                  file = r.get("filename", "").lstrip("./")
                  line = r.get("line_number", "")
                  conf = r.get("issue_confidence", "")
                  msg  = r.get("issue_text", "").replace("|", "\\|")[:120]
                  cwe  = r.get("issue_cwe", {}).get("id", "")
                  cwe_s = f"CWE-{cwe}" if cwe else ""
                  return f"| {sev} | `{file}` | {line} | {conf} | {cwe_s} | {msg} |"

              cols = ["Severity", "File", "Line", "Confidence", "CWE", "Issue"]
              section("🔴 High / Critical", high,   cols, bandit_row)
              section("🟡 Medium",          medium, cols, bandit_row)
              section("🔵 Low",             low,    cols, bandit_row)
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── Semgrep ───────────────────────────────────────────────────────
          write("---")
          write("### 🔎 Semgrep — SAST")
          try:
              with open("reports/semgrep-report/semgrep-report.json") as f:
                  data = json.load(f)
              results = data.get("results", [])

              def sg_sev(r):
                  return r.get("extra", {}).get("severity", "").upper()

              high   = [r for r in results if sg_sev(r) in ("ERROR", "HIGH", "CRITICAL")]
              medium = [r for r in results if sg_sev(r) in ("WARNING", "MEDIUM")]
              low    = [r for r in results if sg_sev(r) in ("INFO", "NOTE", "LOW")]

              write(
                  f"**{badge(len(high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(low), 'low')} Low/Info**\n"
              )

              def sg_row(r):
                  sev  = sg_sev(r)
                  file = r.get("path", "").lstrip("./")
                  line = r.get("start", {}).get("line", "")
                  rule = r.get("check_id", "").split(".")[-1][:40]
                  msg  = r.get("extra", {}).get("message", "").replace("|", "\\|")[:100]
                  return f"| {sev} | `{file}` | {line} | `{rule}` | {msg} |"

              cols = ["Severity", "File", "Line", "Rule", "Message"]
              section("🔴 High / Critical", high,   cols, sg_row)
              section("🟡 Medium",          medium, cols, sg_row)
              section("🔵 Low / Info",      low,    cols, sg_row)
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── Gitleaks ──────────────────────────────────────────────────────
          write("---")
          write("### 🔑 Gitleaks — Secrets Detection")
          try:
              with open("reports/gitleaks-report/gitleaks-report.json") as f:
                  content = f.read().strip()
              leaks = json.loads(content) if content and content != "null" else []
              leaks = leaks if isinstance(leaks, list) else []

              write(f"**{badge(len(leaks))} Secrets found** _(all secrets are HIGH by default)_\n")

              def leak_row(leak):
                  rule   = leak.get("RuleID", leak.get("Description", ""))[:40]
                  file   = leak.get("File", "")
                  line   = leak.get("StartLine", "")
                  commit = leak.get("Commit", "")[:8]
                  author = leak.get("Author", "")
                  return f"| `{rule}` | `{file}` | {line} | `{commit}` | {author} |"

              section(
                  f"🔴 Secrets ({len(leaks)} found)", leaks,
                  ["Rule", "File", "Line", "Commit", "Author"],
                  leak_row,
              )
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          # ── pip-audit ─────────────────────────────────────────────────────
          write("---")
          write("### 📦 pip-audit — Dependency CVEs")
          try:
              with open("reports/pip-audit-report/pip-audit-report.json") as f:
                  data = json.load(f)

              vulns = []
              for dep in data.get("dependencies", []):
                  for v in dep.get("vulns", []):
                      aliases = v.get("aliases", [])
                      # Pull CVSS severity from fix_versions or description heuristic
                      desc = v.get("description", "").upper()
                      if any(w in desc for w in ("CRITICAL",)):
                          tier = "high"
                      elif any(w in desc for w in ("HIGH",)):
                          tier = "high"
                      elif any(w in desc for w in ("MEDIUM", "MODERATE")):
                          tier = "medium"
                      elif any(w in desc for w in ("LOW",)):
                          tier = "low"
                      else:
                          tier = "medium"  # default unknown to medium
                      vulns.append({
                          "package": dep.get("name", ""),
                          "version": dep.get("version", ""),
                          "id":      v.get("id", ""),
                          "aliases": ", ".join(aliases),
                          "fix":     ", ".join(v.get("fix_versions", [])) or "no fix",
                          "tier":    tier,
                      })

              high   = [v for v in vulns if v["tier"] == "high"]
              medium = [v for v in vulns if v["tier"] == "medium"]
              low    = [v for v in vulns if v["tier"] == "low"]

              write(
                  f"**{badge(len(high))} High/Critical &nbsp;&nbsp; "
                  f"{badge(len(medium), 'medium')} Medium &nbsp;&nbsp; "
                  f"{badge(len(low), 'low')} Low**\n"
              )

              def pip_row(v):
                  return f"| `{v['package']}` | {v['version']} | `{v['id']}` | {v['aliases']} | {v['fix']} |"

              cols = ["Package", "Version", "ID", "Aliases (CVE)", "Fix Version"]
              section("🔴 High / Critical", high,   cols, pip_row)
              section("🟡 Medium",          medium, cols, pip_row)
              section("🔵 Low",             low,    cols, pip_row)

              if not vulns:
                  write("✅ No vulnerable dependencies found.")
          except FileNotFoundError:
              write("_Report not found._")
          except Exception as e:
              write(f"_Error parsing report: {e}_")

          write("\n---")
          write("_Full reports available as workflow artifacts._")
          EOF
